<hr>
<h1>form control - II</h1>
<form [formGroup]="formulario">
    <label for="nome">Nome:</label>
    <input type="text" id="nome" formControlName="nome"><br>

    <p>Valor do nome: {{ formulario.get('nome')?.value }}</p>
    <button type="button" (click)="limparNome()">Limpar</button>

    <div formGroupName="endereco">
        <label for="logradouro">Logradouro:</label>
        <input type="text" id="logradouro" formControlName="logradouro"><br>

        <label for="numero">Número:</label>
        <input type="text" id="numero" formControlName="numero"><br>
        <button type="button" (click)="limparNumero()">Limpar</button>

        <label for="bairro">Bairro:</label>
        <input type="text" id="bairro" formControlName="bairro"><br>
    </div>
    <button type="button" (click)="limparEndereco()">Limpar Endereço</button>

    <br>

    <button type="button" (click)="limparTudo()">Limpar Tudo</button>



</form>
